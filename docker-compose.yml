version: "3.9"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:nightly
    ports:
      - "8545:8545"
    entrypoint:
      - anvil
      - --host
      - "0.0.0.0"
      - --port
      - "8545"
      - --block-time
      - "12"
      - --chain-id
      - "31337"
    volumes:
      - anvil_data:/data

  deploy:
    build: .
    depends_on:
      anvil:
        condition: service_started
    environment:
      - RPC_LOCALHOST=http://anvil:8545
      - PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    entrypoint:
      - sh
      - -c
      - |
        sleep 2
        forge script script/Deploy.s.sol:DeployScript \
          --rpc-url http://anvil:8545 \
          --private-key $$PRIVATE_KEY \
          --broadcast \
          -vvvv

  test:
    build: .
    depends_on:
      - deploy
    entrypoint:
      - sh
      - -c
      - |
        forge test --rpc-url http://anvil:8545 -vvv

volumes:
  anvil_data:
